<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Set Budget</title>

    <link rel="stylesheet"
     href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card p-4 mx-auto shadow" style="max-width:500px">

        <h3 class="text-center mb-4">💰 Set Budget</h3>

        <form action="/budget/save" method="post">

            <!-- Amount -->
            <div class="mb-3">
                <label>Amount Limit</label>
                <input type="number" name="amountLimit" class="form-control" required>
            </div>

            <!-- Category -->
            <div class="mb-3">
                <label>Category</label>
               <select name="categoryId" class="form-control" required>

    <option value="">Select Category</option>

    <option th:each="cat : ${categories}"
            th:value="${cat.id}"
            th:text="${cat.name}">
    </option>

</select>
    

</select>
            </div>

            <!-- Start Date -->
            <div class="mb-3">
                <label>Start Date</label>
                <input type="date" name="startDate" class="form-control" required>
            </div>

            <!-- End Date -->
            <div class="mb-3">
                <label>End Date</label>
                <input type="date" name="endDate" class="form-control" required>
            </div>

            <!-- Period -->
            <div class="mb-3">
                <label>Period Type</label>
                <select name="periodType" class="form-control">

                    <option value="MONTHLY">Monthly</option>
                    <option value="WEEKLY">Weekly</option>

                </select>
            </div>

            <!-- Submit -->
            <button class="btn btn-success w-100">
                Save Budget
            </button>

        </form>

    </div>

</div>

</body>
</html>
