<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Transaction</title>
    <link rel="stylesheet" 
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">Add Transaction</h2>

    <form th:action="@{/transactions/save}" method="post">

        <!-- Date -->
        <div class="mb-3">
            <label>Date</label>
            <input type="date" name="date" class="form-control" required>
        </div>

        <!-- Amount -->
        <div class="mb-3">
            <label>Amount</label>
            <input type="number" name="amount" class="form-control" required>
        </div>

        <!-- Type -->
        <div class="mb-3">
            <label>Type</label>
            <select name="type" class="form-control">
                <option value="INCOME">Income</option>
                <option value="EXPENSE">Expense</option>
            </select>
        </div>

        <!-- Category -->
        <div class="mb-3">
            <label>Category</label>
            <select name="category.id" class="form-control" required>
                <option value="">Select Category</option>
                <option th:each="cat : ${categories}" 
                        th:value="${cat.id}" 
                        th:text="${cat.name}">
                </option>
            </select>
        </div>

        <!-- Account -->
        <div class="mb-3">
    <label>Account</label>
    <select name="account.id" class="form-control" required>
        <option value="">Select Account</option>

        <option th:each="acc : ${accounts}" 
                th:value="${acc.id}" 
                th:text="${acc.accountName + ' (' + acc.accountType + ')'}">
        </option>

    </select>
</div>

        <!-- Description -->
        <div class="mb-3">
            <label>Description</label>
            <input type="text" name="description" class="form-control">
        </div>

        <!-- Submit -->
        <button type="submit" class="btn btn-primary w-100">
            Save Transaction
        </button>

    </form>
</div>

</body>
</html>
