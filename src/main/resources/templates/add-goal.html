<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Add Goal</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container mt-5">

    <!-- 🔹 ADD GOAL FORM -->
    <div class="card p-4 mx-auto shadow" style="max-width:500px">

        <h3 class="text-center mb-4">🎯 Add Savings Goal</h3>

        <form th:action="@{/goals/save}" th:object="${goal}" method="post">

            <!-- Goal Name -->
            <div class="mb-3">
                <label>Goal Name</label>
                <input type="text" th:field="*{name}" class="form-control" required>
            </div>

            <!-- Target Amount -->
            <div class="mb-3">
                <label>Target Amount</label>
                <input type="number" th:field="*{targetAmount}" class="form-control" required>
            </div>

            <!-- Save Button -->
            <button class="btn btn-success w-100">
                Save Goal
            </button>

        </form>

    </div>

    <!-- 🔹 GOALS LIST -->
<!-- 🔹 GOALS LIST -->
<div class="mt-5">

    <h4 class="text-center mb-3">📊 Your Goals</h4>

    <div th:if="${#lists.isEmpty(goals)}"
         class="text-center text-muted">
        No goals added yet
    </div>

    <div th:each="g : ${goals}" class="card p-3 mb-3 shadow-sm">

        <!-- HEADER -->
        <div class="d-flex justify-content-between align-items-center">
            <h5 th:text="${g.name}">Goal Name</h5>

            <div>
                ₹ <span th:text="${g.savedAmount}">0</span> /
                ₹ <span th:text="${g.targetAmount}">0</span>
            </div>
        </div>

        <!-- REMAINING -->
        <p class="text-muted mb-1">
            Remaining:
            ₹ <span th:text="${g.targetAmount - g.savedAmount}">0</span>
        </p>

        <!-- PROGRESS -->
        <div class="progress mt-2" style="height: 20px;">
            <div class="progress-bar bg-success"
                 th:style="'width:' + (${g.targetAmount > 0 ? (g.savedAmount * 100 / g.targetAmount) : 0}) + '%'">

                <span th:text="${g.targetAmount > 0 ? (g.savedAmount * 100 / g.targetAmount) : 0} + '%'"></span>

            </div>
        </div>

        <!-- ACTIONS -->
        <div class="mt-3 d-flex gap-2">

            <!-- ADD MONEY -->
            <form action="/goals/addAmount" method="post" class="d-flex gap-2">
                <input type="hidden" name="goalId" th:value="${g.id}">
                <input type="number" name="amount" placeholder="Add ₹" class="form-control" style="width:120px" required>
                <button class="btn btn-success btn-sm">Add</button>
            </form>

            <!-- REMOVE MONEY -->
            <form action="/goals/removeAmount" method="post" class="d-flex gap-2">
                <input type="hidden" name="goalId" th:value="${g.id}">
                <input type="number" name="amount" placeholder="Remove ₹" class="form-control" style="width:120px" required>
                <button class="btn btn-warning btn-sm">Remove</button>
            </form>

            <!-- DELETE -->
            <a th:href="@{/goals/delete/{id}(id=${g.id})}"
               class="btn btn-danger btn-sm"
               onclick="return confirm('Delete this goal?')">
                Delete
            </a>

        </div>

    </div>

</div>
</div>

</body>
</html>
